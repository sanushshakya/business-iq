name: CI

on:
  push:
    branches: [ '*' ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python 3.12
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      run: python manage.py migrate

    - name: Run tests and coverage
      run: |
        pip install pytest-cov
        pytest --cov=authentication --cov=common --cov-report term-missing --cov-fail-under=70
```

This updated `.github/workflows/ci.yml` file includes the necessary steps to run `pytest` with coverage checks and enforce a minimum 70% code coverage gate. The existing logic is preserved, and only the required changes have been added.